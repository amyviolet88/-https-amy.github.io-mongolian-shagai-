<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Монгол Шагай</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background pattern -->
  <div class="bg-pattern">
    <img src="assets/mongolian_pattern.jpg" alt="Монгол хээ" class="bg-img" />
  </div>

  <!-- Audio controls -->
  <div class="audio-controls">
    <button id="audioBtn" class="audio-btn" title="Морин хуурын ая">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon id="playIcon" points="5,3 19,12 5,21" />
        <g id="pauseIcon" style="display:none">
          <rect x="6" y="4" width="4" height="16"/>
          <rect x="14" y="4" width="4" height="16"/>
        </g>
      </svg>
      <span id="audioLabel">Морин хуур</span>
    </button>
  </div>

  <audio id="bgMusic" loop>
    <source src="assets/morin_khuur.mp3" type="audio/mpeg" />
  </audio>

  <!-- Main content -->
  <main class="main-container">
    <h1 class="title">ᠮᠣᠩᠭᠣᠯ ᠱᠠᠭᠠᠢ</h1>
    <p class="subtitle">Монгол шагай</p>

    <!-- Circular frame with spinning shagai -->
    <div class="circle-frame">
      <div class="circle-inner">
        <div class="shagai-ring" id="shagaiRing">
          <!-- 4 shagai orbiting -->
          <div class="shagai-orbit orbit-0">
            <div class="shagai-item" data-name="Морь">
              <img src="assets/mori.png" alt="Морь" />
              <span class="shagai-label">Морь</span>
            </div>
          </div>
          <div class="shagai-orbit orbit-1">
            <div class="shagai-item" data-name="Тэмээ">
              <img src="assets/temee.png" alt="Тэмээ" />
              <span class="shagai-label">Тэмээ</span>
            </div>
          </div>
          <div class="shagai-orbit orbit-2">
            <div class="shagai-item" data-name="Хонь">
              <img src="assets/honi.png" alt="Хонь" />
              <span class="shagai-label">Хонь</span>
            </div>
          </div>
          <div class="shagai-orbit orbit-3">
            <div class="shagai-item" data-name="Ямаа">
              <img src="assets/yamaa.png" alt="Ямаа" />
              <span class="shagai-label">Ямаа</span>
            </div>
          </div>

          <!-- Center decoration -->
          <div class="center-symbol">
            <div class="center-inner">
              <span>᠐</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Info cards -->
    <div class="info-cards">
      <div class="info-card">
        <div class="card-icon">🐴</div>
        <h3>Морь</h3>
        <p>Хурдан, авьяастай</p>
      </div>
      <div class="info-card">
        <div class="card-icon">🐪</div>
        <h3>Тэмээ</h3>
        <p>Тэвчээртэй, хүчтэй</p>
      </div>
      <div class="info-card">
        <div class="card-icon">🐑</div>
        <h3>Хонь</h3>
        <p>Номхон, дулаан</p>
      </div>
      <div class="info-card">
        <div class="card-icon">🐐</div>
        <h3>Ямаа</h3>
        <p>Ухаалаг, зоригтой</p>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
